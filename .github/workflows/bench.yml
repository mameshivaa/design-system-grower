name: Benchmark

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * 1'

jobs:
  benchmark:
    name: Benchmark catalog precision
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run benchmark
        run: node scripts/bench.mjs
